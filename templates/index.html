<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agro AI Expert</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f172a,#1e40af,#06b6d4);
color:white;
min-height:100vh;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.header{
text-align:center;
padding:18px;
font-size:26px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:420px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(25px);
border-radius:18px;
padding:18px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.media{text-align:center;}
video,img{
width:90%;
border-radius:12px;
margin-top:10px;
}

input{
width:100%;
padding:8px;
margin-top:8px;
border-radius:10px;
border:none;
}

.result{
margin-top:10px;
background:rgba(0,0,0,0.4);
padding:12px;
border-radius:12px;
white-space:pre-line;
height:180px;
overflow:auto;
}

button{
padding:8px 14px;
margin-top:8px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#7c3aed,#06b6d4);
color:white;
cursor:pointer;
}

.chat{
height:250px;
overflow:auto;
background:rgba(0,0,0,0.3);
border-radius:10px;
padding:6px;
}

.msg{
padding:8px;
margin:6px;
border-radius:10px;
max-width:80%;
}

.user{
background:#3b82f6;
margin-left:auto;
}

.bot{
background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">🌱 Agro AI Expert Pro</div>

<div class="container">

<div class="card">
<h3>📷 Leaf Detection</h3>

<input type="file" id="imgInp">

<div class="media">
<img id="preview">
</div>

<button onclick="analyze()">Analyze</button>
<button onclick="startCamera()">Camera</button>

<div class="media">
<video id="video" autoplay></video>
</div>

<button onclick="capture()">Capture</button>

<div id="result" class="result"></div>

<button onclick="getWeather()">Weather</button>
<p id="weather"></p>

<audio id="player" controls style="width:100%"></audio>
</div>

<div class="card">
<h3>🤖 Chatbot</h3>

<div id="chat" class="chat"></div>

<input id="msg" placeholder="Ask something...">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

</div>

<script>

/* ✅ Works for localhost + Render */
const BASE_URL = window.location.origin;

/* SNOW EFFECT */
let c=document.getElementById("bg");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let p=[];
for(let i=0;i<50;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="white";
p.forEach(a=>{
ctx.beginPath();
ctx.arc(a.x,a.y,2,0,Math.PI*2);
ctx.fill();
a.y+=0.6;
if(a.y>c.height)a.y=0;
});
requestAnimationFrame(draw);
}
draw();

/* AUDIO */
function playAudio(url){
if(!url) return;
let player=document.getElementById("player");
player.src=url;
player.play().catch(()=>{});
}

/* IMAGE PREVIEW */
imgInp.onchange=()=>{
preview.src=URL.createObjectURL(imgInp.files[0]);
}

/* ANALYZE */
function analyze(){
result.innerText="Analyzing...";

let file=imgInp.files[0];
if(!file) return alert("Select image!");

let f=new FormData();
f.append("file",file);

fetch(BASE_URL + "/predict",{method:"POST",body:f})
.then(r=>r.json())
.then(d=>{
result.innerText=d.text;
playAudio(d.audio);
})
.catch(()=>{
result.innerText="Server error ❌";
});
}

/* CAMERA */
let stream;

async function startCamera(){
try{
stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;
}catch{
alert("Camera not supported");
}
}

function capture(){
let canvas=document.createElement("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

canvas.toBlob(b=>{
let f=new FormData();
f.append("file",new File([b],"img.jpg"));

fetch(BASE_URL + "/predict",{method:"POST",body:f})
.then(r=>r.json())
.then(d=>{
result.innerText=d.text;
playAudio(d.audio);
});
});

if(stream) stream.getTracks().forEach(t=>t.stop());
}

/* CHAT */
function send(){
if(!msg.value) return;

chat.innerHTML+=`<div class="msg user">${msg.value}</div>`;

fetch(BASE_URL + "/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({msg:msg.value})
})
.then(r=>r.json())
.then(d=>{
chat.innerHTML+=`<div class="msg bot">${d.reply}</div>`;
chat.scrollTop=chat.scrollHeight;
playAudio(d.audio);
});

msg.value="";
}

/* VOICE INPUT */
function voice(){
let SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice not supported");
return;
}

let r=new SpeechRecognition();
r.lang="ta-IN";

r.onresult=e=>{
msg.value=e.results[0][0].transcript;
send();
};

r.start();
}

/* WEATHER */
function getWeather(){
fetch(BASE_URL + "/weather")
.then(r=>r.json())
.then(d=>{
weather.innerText=d.text;
playAudio(d.audio);
});
}

</script>

</body>
</html>
